# docker-compose.yml

# "version" définit la syntaxe Compose utilisée
# On utilise pas de version ici (déprécié depuis Compose v2 — ta version)
# donc on commence directement par "services"

services:

  # ─── SERVICE 1 : PostgreSQL ───────────────────────────────────
  postgres:
    # L'image Docker officielle PostgreSQL version 16
    # Le :16 fixe la version — ne jamais utiliser :latest en prod
    # car une mise à jour automatique peut tout casser
    image: postgres:16

    # Nom du conteneur dans Docker (pour le retrouver avec docker ps)
    container_name: materialflow_postgres

    # Variables d'environnement passées au conteneur
    # Le ${...} lit depuis ton fichier .env automatiquement
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # Ports : "host:conteneur"
    # 5432:5432 = le port 5432 de ta machine pointe sur le port 5432 du conteneur
    # Tu peux te connecter depuis DBeaver sur localhost:5432
    ports:
      - "5432:5432"

    # Volumes : persistance des données
    # Sans volume, si tu stops le conteneur, toutes tes données disparaissent
    # postgres_data:/var/lib/postgresql/data = les données sont sauvées sur ta machine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Ce dossier sera exécuté automatiquement au premier démarrage
      # Pour créer les tables dès le lancement
      - ./sql:/docker-entrypoint-initdb.d

    # Politique de redémarrage
    # unless-stopped = redémarre automatiquement sauf si tu l'arrêtes manuellement
    restart: unless-stopped

    # Healthcheck : vérifie que Postgres est vraiment prêt à accepter des connexions
    # Sans ça, Airflow peut tenter de se connecter avant que Postgres soit prêt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s     # vérifie toutes les 10 secondes
      timeout: 5s       # timeout de 5 secondes
      retries: 5        # essaie 5 fois avant de déclarer le service "unhealthy"

  # ─── SERVICE 2 : Airflow ──────────────────────────────────────
  # Airflow a besoin de plusieurs composants :
  # - webserver : l'interface web (port 8080)
  # - scheduler : le processus qui exécute les DAGs
  # - une base de données pour stocker son état (on réutilise postgres)

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: materialflow_airflow_init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
    # Cette commande initialise la base Airflow puis s'arrête
    command: version
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: materialflow_airflow_web
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'   # désactive les DAGs d'exemple
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
    command: webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
      - postgres

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: materialflow_airflow_scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
    command: scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
      - postgres

  # ─── SERVICE 3 : Metabase ─────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: materialflow_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

# ─── VOLUMES ──────────────────────────────────────────────────
# Déclare les volumes nommés utilisés par les services
# Docker les gère sur ta machine dans /var/lib/docker/volumes/
volumes:
  postgres_data:    # données PostgreSQL persistantes
